<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(to bottom, #00FF00, #808080); /* Green to ash (gray) */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        .card {
            background-color: #4B0082; /* Dark purple */
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3); /* Soft drop shadow */
            padding: 20px;
            text-align: center;
            color: white;
            max-width: 300px;
        }
        .card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
        }
        .card h2 {
            margin: 10px 0;
        }
        .card p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="profile.jpg" alt="Profile Image Placeholder">
        <h2>Name: Student Name</h2>
        <p>Stream: Computer Science</p>
        <p>Bio: A passionate learner interested in technology and innovation.</p>
    </div>
</body>
</html>
